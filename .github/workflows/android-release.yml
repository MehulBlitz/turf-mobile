name: Android Release

on:
  workflow_dispatch: {}

jobs:
  release:
    name: Build Android APK and publish release
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 33
          build-tools: 33.0.2

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build production web assets
        run: npm run build

      - name: Verify Capacitor CLI
        run: npm exec -- cap --version

      - name: Sync Android project
        run: npm run android:sync
        shell: bash

      - name: Assemble debug APK
        run: cd android && ./gradlew assembleDebug
        shell: bash

      - name: Publish Android debug APK release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: android-debug-${{ github.run_number }}
          name: Android Debug Build ${{ github.run_number }}
          body: |
            Android debug APK built from commit `${{ github.sha }}`.
            This release contains the debug APK generated by the Android Release workflow.
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
