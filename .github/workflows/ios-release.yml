name: iOS Release

on:
  workflow_dispatch:
    inputs:
      testflight:
        description: 'Deploy to TestFlight after building'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  ios-release:
    name: Build iOS Release IPA
    runs-on: macos-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up Xcode
        run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build production web assets
        run: npm run build

      - name: Verify Capacitor CLI
        run: npm exec -- cap --version

      - name: Sync iOS project
        run: npm run ios:sync
        shell: bash

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/App/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/App/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Install CocoaPods dependencies
        run: |
          cd ios/App
          pod install --repo-update
        shell: bash

      - name: Import provisioning profile for signing
        if: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 != '' }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
        shell: bash

      - name: Import code signing certificate
        if: ${{ secrets.IOS_SIGNING_CERTIFICATE_BASE64 != '' }}
        env:
          CERTIFICATE_PATH: ${{ runner.temp }}/certificate.p12
          KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db
        run: |
          echo "${{ secrets.IOS_SIGNING_CERTIFICATE_BASE64 }}" | base64 --decode -o $CERTIFICATE_PATH
          
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          
          security import $CERTIFICATE_PATH \
            -k $KEYCHAIN_PATH \
            -P "${{ secrets.CERTIFICATE_PASSWORD }}" \
            -A
          
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
        shell: bash

      - name: Build Release Archive
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -derivedDataPath ../../build \
            -allowProvisioningUpdates \
            archive \
            -archivePath ../../build/App-Release.xcarchive
        shell: bash

      - name: Create ExportOptions.plist
        run: |
          mkdir -p build
          cat > build/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.turfbooking.app</key>
                  <string>iOS App Store Provisioning Profile: com.turfbooking.app</string>
              </dict>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF
        shell: bash

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/App-Release.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/ipa
        shell: bash

      - name: Rename IPA
        run: |
          mv build/ipa/App.ipa build/app-release-${{ github.run_number }}.ipa
        shell: bash

      - name: Upload to TestFlight
        if: github.event.inputs.testflight == 'true' && env.HAS_APPLE_API_KEY == 'true'
        run: |
          xcrun altool --upload-app \
            --file build/app-release-${{ github.run_number }}.ipa \
            --type ios \
            --apiKey "${{ secrets.APPLE_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPLE_API_ISSUER_ID }}" \
            --show-progress
        shell: bash

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ios-release-${{ github.run_number }}
          name: iOS Release ${{ github.run_number }}
          body: |
            Release IPA built from commit `${{ github.sha }}`.
            ${{ github.event.inputs.testflight == 'true' && '✅ Uploaded to TestFlight' || '⏸️ Not uploaded to TestFlight' }}
          files: build/app-release-${{ github.run_number }}.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-release
          path: build/app-release-${{ github.run_number }}.ipa
          retention-days: 60
